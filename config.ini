; ============================================================================
; VizKit configuration file
; Lines starting with ; or # are comments and are ignored.
; Keys are case-sensitive. Do not add spaces around "=".
; ============================================================================

[General]
; Theme: Classic | Matrix | Cyber | Blue | Light
Theme=Classic

; Show the ASCII banner on startup (1 = yes, 0 = no)
ShowBanner=1

; Which menu loads first: MainMenu
DefaultPage=MainMenu

; Enable session logging to Logs\ (1 = yes, 0 = no)
LoggingEnabled=1

; Folder (relative to VizKit root) VizKit scans for plugins
PluginFolder=Plugins

; Number of menu items shown per page before pagination kicks in
PageSize=14

; Ask for confirmation before running commands flagged as sensitive (1/0)
ConfirmSensitive=1
